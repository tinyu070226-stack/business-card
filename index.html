<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劉庭宇 | 聯絡資訊</title>
    <!-- 引入 Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 現代玻璃擬物化 (Glassmorphism) 設計風格 */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15), transparent 25%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* overflow: hidden; */
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            margin: 2rem 0;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.8), transparent);
            border-radius: 100%;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 96px;
            height: 96px;
            min-width: 96px;        /* 防止在手機上被擠壓變形 */
            min-height: 96px;       /* 防止在手機上被擠壓變形 */
            box-sizing: border-box; /* 確保邊框不會撐破圓形比例 */
            border-radius: 50%;     /* 確保外框是正圓形 */
            background: rgba(255, 255, 255, 0.05); /* 給一個淡淡的玻璃底色 */
            border: 2px solid rgba(56, 189, 248, 0.4); /* 加上科技感的亮藍色細邊框 */
            margin: 0 auto 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;       /* 確保超出的部分會被裁切成圓形 */
            padding: 0;             /* 移除留白，讓圖片完全貼合邊緣 */
            /* 以下三行是專門修復 iPhone / iOS Safari 無法將內部圖片裁成圓形的終極 Bug */
            -webkit-mask-image: -webkit-radial-gradient(white, black);
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);

            animation: borderPulse 3s infinite alternate; /* 外框呼吸燈效果 */
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;      /* 讓圖片完全填滿整個圓形，超出的部分會被自動裁掉 */
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
        }

        @keyframes borderPulse {
            0% { box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); transform: scale(1); }
            100% { box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); transform: scale(1.02); }
        }

        h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #f8fafc, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            margin: 0.5rem 0 0;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
        }

        .link-item:hover::before {
            transform: translateX(100%);
        }

        .link-icon {
            width: 24px;
            height: 24px;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
            transition: fill 0.3s ease;
        }
        
        /* 滑鼠懸停時的品牌顏色 */
        .link-item:nth-child(1):hover { border-color: #E1306C; }
        .link-item:nth-child(1):hover .link-icon svg { fill: #E1306C; }
        
        .link-item:nth-child(2):hover { border-color: #1877F2; }
        .link-item:nth-child(2):hover .link-icon svg { fill: #1877F2; }
        
        .link-item:nth-child(3):hover { border-color: #EA4335; }
        .link-item:nth-child(3):hover .link-icon svg { fill: #EA4335; }
        
        .link-item:nth-child(4):hover { border-color: #34A853; }
        .link-item:nth-child(4):hover .link-icon svg { fill: #34A853; }

        .link-content {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .link-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .link-value {
            font-size: 0.95rem;
            font-weight: 600;
            /* 讓長地址自動換行 */
            word-break: break-word; 
            line-height: 1.4;
        }

        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>
